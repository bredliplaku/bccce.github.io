<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#003B73">
    <meta name="base-path" content="..">
    <title>Conference Committee – 5th BCCCE 2026</title>
    <meta name="description" content="Conference Committee for the 5th International Balkans Conference on Challenges of Civil Engineering (BCCCE 2026).">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@7.2.0/css/all.min.css">

    <!-- Shared site-wide styles -->
    <link rel="stylesheet" href="../styles.css">

    <!-- Page-specific styles -->
    <style>
        .committee-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            text-align: left;
            margin-bottom: 48px;
        }

        .member-card {
            background: var(--bg-white);
            border-radius: var(--radius-md);
            padding: 24px;
            box-shadow: var(--shadow-md);
            border-left: 4px solid var(--primary);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .member-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .member-name {
            color: var(--primary-dark);
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .member-position {
            font-size: 0.75rem;
            background: var(--accent);
            color: #1A1A1A;
            padding: 2px 8px;
            border-radius: var(--radius-sm);
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .member-affiliation {
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .member-country {
            font-weight: 700;
            color: var(--text-main);
            font-size: 0.85rem;
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .committee-section-title {
            text-align: left;
            margin-bottom: 30px;
        }

        /* Search & Loading Features */
        .local-filter-wrapper {
            margin: 20px 0 40px 0;
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .local-filter-container {
            position: relative;
            width: 100%;
            max-width: 500px;
        }

        .local-filter-input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
        }

        .local-filter-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(0, 83, 159, 0.1);
        }

        #committee-loading {
            padding: 80px 0;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--primary-light);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .error-message {
            color: #b91c1c;
            background: #fee2e2;
            padding: 15px 25px;
            border-radius: var(--radius-md);
            border: 1px solid #fecaca;
            display: inline-block;
        }

        /* Support for Profile Photos */
        .member-card {
            display: flex !important;
            flex-direction: row !important;
            align-items: center !important;
            gap: 20px !important;
            position: relative !important;
        }

        .member-info-container {
            flex: 1 !important;
            min-width: 0 !important;
        }

        .member-photo-wrapper {
            width: 60px !important;
            height: 60px !important;
            border-radius: 50% !important;
            overflow: hidden !important;
            flex-shrink: 0 !important;
            border: 2px solid var(--primary-light) !important;
            background: var(--bg-white) !important;
        }

        .member-photo {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
            image-rendering: -webkit-optimize-contrast !important;
        }

        /* External Link Icon */
        .member-link {
            position: absolute !important;
            bottom: 12px !important;
            right: 12px !important;
            background: var(--primary-light) !important;
            color: var(--primary) !important;
            width: 24px !important;
            height: 24px !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            border-radius: 50% !important;
            text-decoration: none !important;
            transition: all 0.2s ease !important;
            opacity: 0.7 !important;
        }

        .member-link:hover {
            background: var(--primary) !important;
            color: white !important;
            opacity: 1 !important;
        }

        .member-link svg {
            width: 12px !important;
            height: 12px !important;
            fill: currentColor !important;
        }

        .has-link {
            padding-bottom: 30px !important;
        }

        .topic-card.hidden { display: none !important; }
        .committee-grid:empty + .committee-section-title,
        .committee-section-title:has(+ .committee-grid:empty) { display: none !important; }
    </style>
</head>

<body>
    <!-- Shared Header -->
    <div id="site-header"></div>

    <!-- Page Hero -->
    <header class="page-hero animate-in">
        <div class="container">
            <nav class="breadcrumb" aria-label="Breadcrumb">
                <a href="../"><i class="fas fa-home"></i> Home</a>
                <i class="fas fa-chevron-right" style="font-size:0.7rem;"></i>
                <span>Conference Committee</span>
            </nav>
            <h1>Conference <span>Committee</span></h1>
            <p>Our dedicated team of professionals working to ensure the technical excellence of BCCCE 2026.</p>
        </div>
    </header>

    <!-- Sponsors Carousel -->
    <div id="site-sponsors" data-sponsors="false"></div>

    <!-- Page Content -->
    <main class="page-content">
        <div class="container animate-in-delay">
            
            <div id="committee-features">
                <div class="local-filter-wrapper">
                    <div class="local-filter-container">
                        <svg style="position:absolute; left:14px; top:50%; transform:translateY(-50%); width:18px; height:18px; fill:var(--text-muted); pointer-events:none;" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                        <input type="text" class="local-filter-input" id="committee-filter" placeholder="Search committee members by name, institution, or country...">
                    </div>
                </div>

                <div id="committee-loading" style="display: none;">
                    <div class="spinner"></div>
                    <p>Fetching latest committee data...</p>
                </div>

                <div id="committee-error" style="display: none; text-align: center; margin-bottom: 40px;">
                    <div class="error-message">Connection failed, please refresh the page.</div>
                </div>

                <div id="committee-content">
                    <!-- Local Organizing Committee -->
                    <div id="local-section">
                        <div class="committee-section-title">
                            <h2 class="section-heading">Local Organizing <span class="section-subheading">Committee</span></h2>
                            <div class="section-divider"></div>
                        </div>
                        <div class="committee-grid" id="local-grid"></div>
                    </div>

                    <!-- International Scientific Committee -->
                    <div id="international-section" style="margin-top: 60px;">
                        <div class="committee-section-title">
                            <h2 class="section-heading">International Scientific <span class="section-subheading">Committee</span></h2>
                            <div class="section-divider"></div>
                        </div>
                        <div class="committee-grid" id="international-grid"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Shared Footer -->
    <div id="site-footer" data-partners="true"></div>

    <!-- Features Script -->
    <script>
        (function() {
            const API_URL = 'https://script.google.com/macros/s/AKfycbzLUksT8MjfuA9MXmV5oo0mQDb0JTcvKnsiFR5IkbpekBA4UYt4ApPNfD17galV5wMuPA/exec';
            const CACHE_KEY = 'committee_data_cache';
            const CACHE_TTL = 3600000; // 1 hour

            const localGrid = document.getElementById('local-grid');
            const internationalGrid = document.getElementById('international-grid');
            const localSection = document.getElementById('local-section');
            const internationalSection = document.getElementById('international-section');
            const loadingDiv = document.getElementById('committee-loading');
            const errorDiv = document.getElementById('committee_error') || document.getElementById('committee-error');
            const contentDiv = document.getElementById('committee-content');
            const filterInput = document.getElementById('committee-filter');

            async function fetchData() {
                const cached = localStorage.getItem(CACHE_KEY);
                if (cached) {
                    const { data, timestamp } = JSON.parse(cached);
                    renderCommittee(data);
                    
                    // Background refresh if older than CACHE_TTL
                    if (Date.now() - timestamp > CACHE_TTL) {
                        refreshInBackground();
                    }
                } else {
                    loadingDiv.style.display = 'flex';
                    contentDiv.style.opacity = '0.3';
                    
                    try {
                        const response = await fetch(API_URL);
                        const data = await response.json();
                        
                        localStorage.setItem(CACHE_KEY, JSON.stringify({
                            data: data,
                            timestamp: Date.now()
                        }));
                        
                        renderCommittee(data);
                    } catch (error) {
                        errorDiv.style.display = 'block';
                        console.error('Fetch error:', error);
                    } finally {
                        loadingDiv.style.display = 'none';
                        contentDiv.style.opacity = '1';
                    }
                }
            }

            async function refreshInBackground() {
                try {
                    const response = await fetch(API_URL);
                    const data = await response.json();
                    localStorage.setItem(CACHE_KEY, JSON.stringify({
                        data: data,
                        timestamp: Date.now()
                    }));
                    renderCommittee(data);
                } catch (e) { console.warn('Background refresh failed'); }
            }

            function renderCommittee(data) {
                localGrid.innerHTML = '';
                internationalGrid.innerHTML = '';
                
                const localItems = [];
                const internationalItems = [];

                data.forEach(item => {
                    const committeeType = (item.Committee || '').toLowerCase();
                    if (committeeType.includes('local')) {
                        localItems.push(item);
                    } else {
                        internationalItems.push(item);
                    }
                });

                // Local: Sheet order | International: Alphabetical
                internationalItems.sort((a, b) => {
                    const nameA = (a['Full Name'] || '').toLowerCase();
                    const nameB = (b['Full Name'] || '').toLowerCase();
                    return nameA.localeCompare(nameB);
                });

                localItems.forEach(item => localGrid.appendChild(createCard(item)));
                internationalItems.forEach(item => internationalGrid.appendChild(createCard(item)));

                localSection.style.display = localItems.length > 0 ? 'block' : 'none';
                internationalSection.style.display = internationalItems.length > 0 ? 'block' : 'none';
            }

            function createCard(item) {
                const card = document.createElement('div');
                card.className = 'member-card';
                
                const acadTitle = (item['Academic Title'] || item['Title'] || '').trim();
                const fullName = item['Full Name'] || '';
                const position = item['Position'] ? `<span class="member-position">${item['Position']}</span>` : '';
                const institution = item['Institution'] || '';
                const country = item['Country'] || '';
                const link = (item['Link'] || '').trim();
                const photoUrl = (item['Profile Photo'] || item['Profile Photo with link'] || '').trim();
                const titleSpacing = acadTitle ? ' ' : '';

                if (link) card.classList.add('has-link');

                let cardHTML = '';
                
                if (photoUrl) {
                    cardHTML += `
                        <div class="member-photo-wrapper">
                            <img src="${photoUrl}" class="member-photo" alt="${fullName}" onerror="this.parentElement.style.display='none'">
                        </div>
                    `;
                }

                cardHTML += `
                    <div class="member-info-container">
                        <div class="member-name">${acadTitle}${titleSpacing}${fullName}${position}</div>
                        <div class="member-affiliation">${institution}</div>
                        <div class="member-country">${country}</div>
                    </div>
                `;

                if (link) {
                    cardHTML += `
                        <a href="${link}" target="_blank" class="member-link" title="View Profile">
                            <svg viewBox="0 0 24 24">
                                <path d="M14,3V5H17.59L7.76,14.83L9.17,16.24L19,6.41V10H21V3M19,19H5V5H12V3H5C3.89,3 3,3.9 3,5V19A2,2 0 0,0 5,21H19A2,2 0 0,0 21,19V12H19V19Z" />
                            </svg>
                        </a>
                    `;
                }

                card.innerHTML = cardHTML;
                return card;
            }

            // Real-time Search Filter
            filterInput.addEventListener('input', function(e) {
                const query = e.target.value.toLowerCase().trim();
                const allCards = document.querySelectorAll('.member-card');
                
                allCards.forEach(card => {
                    const text = card.textContent.toLowerCase();
                    if (text.includes(query)) {
                        card.style.display = 'flex';
                    } else {
                        card.style.display = 'none';
                    }
                });

                // Hide empty sections
                [localGrid, internationalGrid].forEach(grid => {
                    const section = grid.parentElement;
                    const hasVisible = Array.from(grid.children).some(child => child.style.display !== 'none');
                    section.style.display = hasVisible ? 'block' : 'none';
                });
            });

            fetchData();
        })();
    </script>

    <!-- Shared Footer -->
    <div id="site-footer" data-partners="true"></div>

    <!-- Shared site-wide JS -->
    <script src="../scripts.js"></script>
</body>

</html>
