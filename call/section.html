<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <style>
        /* CSS Robustness & Isolation Overrides */
        :root {
            --primary: #00539F;
            --primary-dark: #003B73;
            --primary-light: #EBF3FA;
            --accent: #FFB81C;
            --text-main: #1A1A1A;
            --text-muted: #666666;
            --bg-white: #FFFFFF;
            --border: #E2E8F0;
            --radius-rough: 2px;
            --shadow-subtle: 0 4px 12px rgba(0, 0, 0, 0.05);
        }

        .isolated-content,
        .isolated-content * {
            box-sizing: border-box !important;
            margin: 0;
            padding: 0;
        }

        .isolated-content {
            font-family: 'Google Sans Flex', 'Plus Jakarta Sans', sans-serif !important;
            color: var(--text-main) !important;
            line-height: 1.5 !important;
            width: 100% !important;
            max-width: 100% !important;
            display: block !important;
            clear: both !important;
            padding: 15px 0 !important;
            background: var(--bg-white) !important;
            text-align: left !important;
            overflow: hidden !important;
            min-width: 0 !important;
            box-sizing: border-box !important;
        }

        /* Page Hero Styles (Centered Blue Bar) */
        .page-hero-mini {
            background: var(--primary) !important;
            color: white !important;
            padding: 10px 15px !important;
            border-radius: var(--radius-rough) !important;
            font-size: 0.85rem !important;
            font-weight: 700 !important;
            margin: 0 0 24px 0 !important;
            display: block !important;
            text-align: center !important;
            text-transform: uppercase !important;
            letter-spacing: 2px !important;
            user-select: none !important;
            overflow-wrap: break-word !important;
            width: 100% !important;
            max-width: 100% !important;
            min-width: 0 !important;
            box-sizing: border-box !important;
        }

        .page-hero-mini h1 {
            font-size: 0.85rem !important;
            margin: 0 !important;
            color: white !important;
            text-align: center !important;
            display: block !important;
        }

        .call-list-group {
            display: grid !important;
            grid-template-columns: 1fr !important;
            gap: 3px !important;
            margin: 0 !important;
            width: 100% !important;
            max-width: 100% !important;
            min-width: 0 !important;
            box-sizing: border-box !important;
        }

        .call-card {
            background: var(--bg-white) !important;
            padding: 24px 22px !important;
            border: 1px solid var(--border) !important;
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            justify-content: center !important;
            gap: 16px !important;
            box-sizing: border-box !important;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1) !important;
            position: relative !important;
            border-radius: 12px !important;
            text-align: center !important;
            width: 100% !important;
            max-width: 100% !important;
            min-width: 0 !important;
        }

        .call-card:hover {
            box-shadow: 4px 4px 20px rgba(0, 0, 0, 0.08) !important;
            background: #FAFBFF !important;
        }

        .icon-wrapper {
            width: 56px !important;
            height: 56px !important;
            background: var(--primary-light) !important;
            color: var(--primary) !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            border-radius: 50% !important;
            margin-bottom: 8px !important;
            flex-shrink: 0 !important;
        }

        .icon-wrapper svg {
            width: 28px !important;
            height: 28px !important;
            fill: currentColor !important;
        }

        .call-card h2 {
            font-size: 1.1rem !important;
            color: var(--primary-dark) !important;
            font-weight: 700 !important;
            margin-bottom: 8px !important;
            width: 100% !important;
        }

        .call-card p {
            font-size: 0.85rem !important;
            color: var(--text-muted) !important;
            width: 100% !important;
            max-width: 100% !important;
            line-height: 1.6 !important;
            box-sizing: border-box !important;
        }

        /* SVG Overrides */
        svg {
            vertical-align: middle !important;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@400;500;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="isolated-content">
        <!-- Hero Header Piece -->
        <header class="page-hero-mini" id="call-hero">
            <h1>Author's Guide</h1>
        </header>

        <div class="call-list-group">
            <div class="call-card">
                <div class="icon-wrapper">
                    <svg viewbox="0 0 24 24">
                        <path
                            d="M22.7 19l-9.1-16c-.4-.7-1.1-1-1.9-1s-1.5.3-1.9 1L.7 19c-.4.7-.4 1.5 0 2.2.4.7 1.1 1 1.9 1h18.2c.8 0 1.5-.3 1.9-1 .4-.7.4-1.5 0-2.2zM12 18c-.6 0-1-.4-1-1s.4-1 1-1 1 .4 1 1-.4 1-1 1zm1-4c0 .6-.4 1-1 1s-1-.4-1-1V9c0-.6.4-1 1-1s1 .4 1 1v5z" />
                    </svg>
                </div>
                <p>Comprehensive submission guidelines and manuscript templates are currently under preparation.
                    Detailed
                    instructions for contributors will be made available shortly. Please monitor this section for future
                    updates.</p>
            </div>
        </div>
    </div>

</body>

</html>
