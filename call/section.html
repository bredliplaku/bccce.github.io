<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        /* CSS Robustness & Isolation Overrides */
        :root {
            --primary: #00539F;
            --primary-dark: #003B73;
            --primary-light: #EBF3FA;
            --accent: #FFB81C;
            --text-main: #1A1A1A;
            --text-muted: #666666;
            --bg-white: #FFFFFF;
            --border: #E2E8F0;
            --radius-rough: 2px;
            --shadow-subtle: 0 4px 12px rgba(0, 0, 0, 0.05);
        }

        .isolated-content, .isolated-content * {
            box-sizing: border-box !important;
            margin: 0;
            padding: 0;
        }

        .isolated-content {
            font-family: 'Google Sans Flex', sans-serif !important;
            color: var(--text-main) !important;
            line-height: 1.5 !important;
            width: 100% !important;
            max-width: 100% !important;
            margin: 0 auto !important;
            display: block !important;
            clear: both !important;
            padding: 40px 20px !important;
            background: var(--bg-white) !important;
            text-align: center !important;
        }

        .construction-card {
            background: var(--bg-white) !important;
            border: 1px solid var(--border) !important;
            border-radius: var(--radius-rough) !important;
            padding: 60px 40px !important;
            max-width: 600px !important;
            margin: 0 auto !important;
            box-shadow: var(--shadow-subtle) !important;
            display: block !important;
            width: 100% !important;
        }

        .icon-wrapper {
            margin-bottom: 24px !important;
            color: var(--primary-light) !important;
            display: block !important;
        }

        .icon-wrapper svg {
            width: 64px !important;
            height: 64px !important;
            fill: currentColor !important;
        }

        .construction-card h2 {
            color: var(--primary-dark) !important;
            font-size: 1.8rem !important;
            font-weight: 700 !important;
            margin-bottom: 16px !important;
            display: block !important;
        }

        .construction-card p {
            color: var(--text-muted) !important;
            font-size: 1.1rem !important;
            margin-bottom: 30px !important;
            line-height: 1.6 !important;
            display: block !important;
        }

        .back-link {
            display: inline-flex !important;
            align-items: center !important;
            gap: 10px !important;
            background: var(--primary) !important;
            color: white !important;
            padding: 12px 24px !important;
            border-radius: var(--radius-rough) !important;
            text-decoration: none !important;
            font-weight: 600 !important;
            border: 1px solid var(--primary-dark) !important;
            transition: all 0.2s ease !important;
        }

        .back-link:hover {
            background: var(--primary-dark) !important;
            border-radius: var(--radius-rough) !important;
        }

        /* Compatibility Helpers */
        .isolated-content * {
            max-width: 100% !important;
        }

        svg {
            vertical-align: middle !important;
        }

    </style>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="isolated-content">
    <div class="construction-card">
        <div class="icon-wrapper">
            <svg viewBox="0 0 24 24" viewbox="0 0 24 24"><path d="M22.7 19l-9.1-16c-.4-.7-1.1-1-1.9-1s-1.5.3-1.9 1L.7 19c-.4.7-.4 1.5 0 2.2.4.7 1.1 1 1.9 1h18.2c.8 0 1.5-.3 1.9-1 .4-.7.4-1.5 0-2.2zM12 18c-.6 0-1-.4-1-1s.4-1 1-1 1 .4 1 1-.4 1-1 1zm1-4c0 .6-.4 1-1 1s-1-.4-1-1V9c0-.6.4-1 1-1s1 .4 1 1v5z"/></svg>
        </div>
        <h2>Author's Guide</h2>
        <p>Comprehensive submission guidelines and manuscript templates are currently under preparation. Detailed instructions for contributors will be made available shortly. Please monitor this section for future updates.</p>
    </div>
</div>

</body>
</html>
