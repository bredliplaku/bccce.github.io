<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        /* CSS Robustness & Isolation Overrides */
        :root {
            --primary: #00539F;
            --primary-dark: #003B73;
            --primary-light: #EBF3FA;
            --accent: #FFB81C;
            --text-main: #1A1A1A;
            --text-muted: #666666;
            --bg-white: #FFFFFF;
            --border: #E2E8F0;
            --radius-rough: 2px;
            --shadow-subtle: 0 4px 12px rgba(0, 0, 0, 0.05);
        }

        /* Essential Reset for the content block */
        .isolated-content, .isolated-content * {
            box-sizing: border-box !important;
            margin: 0;
            padding: 0;
        }

        .isolated-content {
            font-family: 'Google Sans Flex', sans-serif !important;
            color: var(--text-main) !important;
            line-height: 1.5 !important;
            width: 100% !important;
            max-width: 100% !important;
            margin: 0 auto !important;
            display: block !important;
            clear: both !important;
            padding: 20px !important;
            background: var(--bg-white) !important;
            text-align: center !important; /* Force global centering base */
        }

        .isolated-content h1, .isolated-content h2, .isolated-content h3 {
            color: var(--primary-dark) !important;
            font-weight: 700 !important;
            line-height: 1.1 !important;
            margin: 0 0 16px 0 !important;
            display: block !important;
            width: 100% !important;
            clear: both !important;
            text-align: center !important;
            word-wrap: break-word !important;
        }

        .isolated-content p {
            margin: 0 0 16px 0 !important;
            text-align: center !important; /* Centered for construction card message */
            font-size: 0.95rem !important;
            word-wrap: break-word !important;
            overflow-wrap: break-word !important;
            display: block !important;
            width: 100% !important;
        }

        /* Hero Header Stack Piece */
        .page-hero-mini {
            text-align: center !important;
            margin-bottom: 24px !important;
            padding-bottom: 20px !important;
            border-bottom: 1px solid var(--border) !important;
            display: block !important;
            width: 100% !important;
            clear: both !important;
        }

        .page-hero-mini h1 {
            font-size: 1.8rem !important;
        }

        .page-hero-mini h1 span {
            color: var(--accent) !important;
        }

        .page-hero-mini p {
            font-size: 1rem !important;
            color: var(--text-muted) !important;
            max-width: 600px !important;
            margin: 0 auto !important;
        }

        /* Construction Card Pieces */
        .construction-section {
            display: block !important;
            width: 100% !important;
            text-align: center !important;
            clear: both !important;
            margin-top: 10px !important;
        }

        .construction-card {
            background: var(--bg-white) !important;
            border-radius: var(--radius-rough) !important;
            box-shadow: var(--shadow-subtle) !important;
            padding: 32px !important;
            border: 1px solid var(--border) !important;
            max-width: 480px !important; /* Fit within narrow containers */
            margin: 0 auto !important; /* Proper centering */
            display: block !important; /* Force block for margin: auto centering */
            width: 100% !important;
            text-align: center !important;
        }

        .construction-icon {
            width: 56px !important;
            height: 56px !important;
            color: var(--primary-light) !important;
            margin: 0 auto 20px auto !important;
            display: block !important;
        }

        .construction-icon svg {
            width: 100% !important;
            height: 100% !important;
            fill: currentColor !important;
            display: block !important;
        }

        .construction-card h2 {
            font-size: 1.4rem !important;
            margin-bottom: 12px !important;
        }

        .construction-card p {
            font-size: 0.95rem !important;
            color: var(--text-muted) !important;
            line-height: 1.5 !important;
            margin-bottom: 0 !important;
            text-align: center !important;
        }

        /* Compatibility Helpers */
        .isolated-content * {
            max-width: 100% !important;
        }

        svg {
            vertical-align: middle !important;
        }

    </style>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="isolated-content">
    <!-- Hero Header Stack Piece -->
    <header class="page-hero-mini">
        <h1>Keynote <span>Speakers</span></h1>
        <p>This section is currently being updated.</p>
    </header>

    <!-- Main Content Piece -->
    <section class="construction-section">
        <div class="construction-card">
            <div class="construction-icon">
                <svg viewBox="0 0 24 24" viewbox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.3 4.7C.2 7.1.6 10.1 2.6 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.7-2.7c.4-.4.4-1.1 0-1.4z"/></svg>
            </div>
            <h2>Under Construction</h2>
            <p>We're working hard to bring you this content. Please check back later for updates regarding our esteemed speakers.</p>
        </div>
    </section>
</div>

</body>
</html>
