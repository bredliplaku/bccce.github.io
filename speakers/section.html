<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <style>
        /* CSS Robustness & Isolation Overrides */
        :root {
            --primary: #00539F;
            --primary-dark: #003B73;
            --primary-light: #EBF3FA;
            --accent: #FFB81C;
            --text-main: #1A1A1A;
            --text-muted: #666666;
            --bg-white: #FFFFFF;
            --border: #E2E8F0;
            --radius-rough: 2px;
            --shadow-subtle: 0 4px 12px rgba(0, 0, 0, 0.05);
            --transition: all 0.2s ease-in-out;
        }

        .isolated-content,
        .isolated-content * {
            box-sizing: border-box !important;
            margin: 0;
            padding: 0;
        }

        .isolated-content {
            font-family: 'Google Sans Flex', 'Plus Jakarta Sans', sans-serif !important;
            color: var(--text-main) !important;
            line-height: 1.5 !important;
            width: 100% !important;
            max-width: 100% !important;
            margin: 0 auto !important;
            display: block !important;
            clear: both !important;
            padding: 15px 20px !important;
            background: var(--bg-white) !important;
            text-align: left !important;
        }

        /* Page Hero Styles (Centered Blue Bar) */
        .page-hero-mini {
            background: var(--primary) !important;
            color: white !important;
            padding: 10px 20px !important;
            border-radius: var(--radius-rough) !important;
            font-size: 0.85rem !important;
            font-weight: 700 !important;
            margin-bottom: 24px !important;
            display: block !important;
            text-align: center !important;
            text-transform: uppercase !important;
            letter-spacing: 3px !important;
            user-select: none !important;
            width: 100% !important;
        }

        .page-hero-mini h1 {
            font-size: 0.85rem !important;
            margin: 0 !important;
            color: white !important;
            text-align: center !important;
            display: block !important;
        }

        /* Detail List Group */
        .speaker-list-group {
            display: grid !important;
            grid-template-columns: 1fr !important;
            gap: 3px !important;
            width: 100% !important;
            padding: 0 4px !important;
        }

        .speaker-card {
            background: var(--bg-white) !important;
            padding: 24px 18px !important;
            border: 1px solid var(--border) !important;
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            justify-content: center !important;
            gap: 16px !important;
            width: 100% !important;
            box-sizing: border-box !important;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1) !important;
            position: relative !important;
            border-radius: 12px !important;
            text-align: center !important;
        }

        .speaker-card:hover {
            box-shadow: 4px 4px 20px rgba(0, 0, 0, 0.08) !important;
            background: #FAFBFF !important;
        }

        .icon-wrapper {
            width: 56px !important;
            height: 56px !important;
            background: var(--primary-light) !important;
            color: var(--primary) !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            border-radius: 50% !important;
            margin-bottom: 8px !important;
        }

        .icon-wrapper svg {
            width: 28px !important;
            height: 28px !important;
            fill: currentColor !important;
        }

        .speaker-card h2 {
            font-size: 1.1rem !important;
            color: var(--primary-dark) !important;
            font-weight: 700 !important;
            margin-bottom: 8px !important;
        }

        .speaker-card p {
            font-size: 0.85rem !important;
            color: var(--text-muted) !important;
            max-width: 400px !important;
            line-height: 1.6 !important;
        }

        /* SVG Overrides */
        svg {
            vertical-align: middle !important;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@400;500;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="isolated-content">
        <!-- Hero Header Piece -->
        <header class="page-hero-mini" id="speakers-hero">
            <h1>Speaker Lineup Pending</h1>
        </header>

        <div class="speaker-list-group">
            <div class="speaker-card">
                <div class="icon-wrapper">
                    <svg viewbox="0 0 24 24">
                        <path
                            d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
                    </svg>
                </div>
                <p>We are currently confirming our lineup of distinguished keynote speakers. Please check back soon for
                    the official schedule and profiles.</p>
            </div>
        </div>
    </div>

</body>

</html>
